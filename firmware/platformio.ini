; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; adafruit_trinket_m0

[env:batt_tester]
platform = atmelsam
board = battTester
framework = arduino
monitor_speed = 115200

board_build.variant = battTester
board_build.variants_dir = variants


build_type = debug
build_unflags = -Os
board_build.ldscript = flash_without_bootloader.ld
build_flags =
    ; -DCRYSTALLESS
    -L${PROJECT_DIR}/ldscript
    -Og -g3 -ggdb3

upload_protocol = custom
extra_scripts = upload_openocd.py

debug_tool = custom
debug_server =
    $PROJECT_PACKAGES_DIR/tool-openocd/bin/openocd
    -s
    $PROJECT_PACKAGES_DIR/tool-openocd/scripts
    -f
    interface/stlink.cfg
    -c
    "transport select hla_swd"
    -c
    "set CHIPNAME at91samd21e18"
    -c
    "set CPUTAPID 0x0bc11477"
    -f
    target/at91samdXX.cfg
    -c
    "init"
    -c
    "reset halt"
